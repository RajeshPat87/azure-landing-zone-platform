###############################################################################
# Step 8: App Onboarding - manually dispatched, one run per application.
# Provisions a spoke landing zone from a tfvars file in environments/landingzone-prod.
###############################################################################
name: app-onboarding

on:
  workflow_dispatch:
    inputs:
      workload:
        description: "Workload name (matches app-<workload>.tfvars)"
        required: true
      action:
        description: "plan | apply | destroy"
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  WORKDIR: environments/landingzone-prod

jobs:
  landing-zone:
    runs-on: ubuntu-latest
    environment: ${{ inputs.action == 'plan' && 'plan' || 'apply' }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init (per-app state key)
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -backend-config="key=landingzones/${{ inputs.workload }}-prod.tfstate"

      - name: Run ${{ inputs.action }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          case "${{ inputs.action }}" in
            plan)    terraform plan   -var-file="app-${{ inputs.workload }}.tfvars" -input=false ;;
            apply)   terraform apply  -var-file="app-${{ inputs.workload }}.tfvars" -input=false -auto-approve ;;
            destroy) terraform destroy -var-file="app-${{ inputs.workload }}.tfvars" -input=false -auto-approve ;;
          esac
